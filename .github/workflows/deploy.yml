name: 🚀 Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main # deploys to production on every push to main
  pull_request:
    branches:
      - main # creates a preview URL for every PR

# Avoid overlapping deploys for the same ref (a new push cancels the in-flight run).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write # needed for GitHub deployment status

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node 20 (matches .nvmrc)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies (clean, lockfile-faithful)
      - name: Install dependencies
        run: npm ci

      # 4. Build the Vite site -> dist/
      - name: Build
        run: npm run build

      # 5. Ensure the Pages project exists (first deploy only).
      #    `wrangler pages deploy` does NOT auto-create a project in non-interactive
      #    CI — it errors with "Project not found" (exit 1). This step creates it and
      #    is a no-op on subsequent runs (continue-on-error swallows the "already
      #    exists" error).
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.90.0'
          command: pages project create ranjbar-dev --production-branch=main

      # 6. Deploy dist/ to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3.90.0'
          command: pages deploy dist --project-name=ranjbar-dev --branch=${{ github.ref_name }}
